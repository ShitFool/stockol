# FB股份 Node.js 版本 - nginx 配置模板
# 将此文件内容添加到 /etc/nginx/conf.d/fbstock.conf
# 请根据实际部署情况替换域名、SSL 证书路径和静态文件路径

server {
    listen 80;
    server_name your-domain.com;

    # 重定向到 HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # SSL 证书（使用 Let's Encrypt 或其他证书）
    ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # SSL 配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 安全头
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # 速率限制
    limit_req_zone $binary_remote_addr zone=fbstock:10m rate=30r/m;
    limit_req zone=fbstock burst=5 nodelay;

    # 静态文件
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        root /path/to/fbstock-server/public;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Socket.IO 和 API 请求代理到 Node.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 超时设置
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # 禁止搜索引擎索引
    location = /robots.txt {
        add_header Content-Type "text/plain";
        return 200 "User-agent: *\nDisallow: /";
    }
}
